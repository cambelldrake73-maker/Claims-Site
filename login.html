<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
* { box-sizing: border-box; }
body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6fb;
margin:0;
min-height:100vh;
padding:20px;
}

.page-top{
max-width:980px;
margin:0 auto 16px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.brand-link{
text-decoration:none;
color:#0f172a;
font-weight:700;
font-size:20px;
}

.top-links a{
text-decoration:none;
color:#2563eb;
font-weight:600;
margin-left:12px;
}

.shell{
max-width:980px;
margin:0 auto;
min-height:calc(100vh - 90px);
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{ background:#1d4ed8; }

.form-link{
display:block;
margin-top:15px;
text-decoration:none;
color:#2563eb;
}
</style>
</head>
<body>

<div class="page-top">
  <a class="brand-link" href="Index.html">Company Name</a>
  <div class="top-links">
    <a href="signup.html">Create Account</a>
  </div>
</div>

<div class="shell">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
    <a class="form-link" href="signup.html">Create an account</a>
  </div>
</div>

</body>
</html>
