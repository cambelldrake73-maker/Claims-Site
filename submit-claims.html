<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Claims</title>
  <style>
    :root { --bg:#f4f6fb; --panel:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb; --brand:#2563eb; --nav:#111827; --nav-hover:#1f2937; --shadow:0 8px 20px rgba(0,0,0,.06); }
    * { box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
    body { margin:0; background:var(--bg); color:var(--text); }
    .layout { min-height:100vh; display:flex; }
    .sidebar-shell { width:56px; transition:width .26s ease; position:relative; flex-shrink:0; }
    .sidebar-shell:hover,.sidebar-shell.pinned { width:250px; }
    .sidebar { height:100%; background:var(--nav); color:#fff; padding:24px 12px; overflow:hidden; }
    .sidebar-head { display:flex; align-items:center; gap:10px; margin-bottom:26px; white-space:nowrap; }
    .company-mark { width:34px; height:34px; border-radius:8px; background:#1d4ed8; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
    .company-name { margin:0; font-size:18px; opacity:0; transform:translateX(-8px); transition:opacity .18s ease,transform .18s ease; }
    .sidebar-shell:hover .company-name,.sidebar-shell.pinned .company-name,.sidebar-shell:hover .nav-label,.sidebar-shell.pinned .nav-label { opacity:1; transform:translateX(0); }
    .sidebar-nav { display:grid; gap:6px; }
    .nav-link { display:flex; align-items:center; color:#d1d5db; text-decoration:none; border-radius:10px; padding:11px 12px; position:relative; }
    .nav-link:hover,.nav-link.active { background:var(--nav-hover); color:#fff; }
    .nav-link::before { content:""; position:absolute; width:12px; height:2px; border-radius:999px; background:rgba(255,255,255,.55); left:14px; top:50%; transform:translateY(-50%); transition:opacity .18s ease; }
    .nav-label { opacity:0; transform:translateX(-8px); transition:opacity .18s ease,transform .18s ease; margin-left:14px; white-space:nowrap; }
    .sidebar-shell:hover .nav-link::before,.sidebar-shell.pinned .nav-link::before { opacity:0; }
    .sidebar-tab { position:absolute; right:-16px; top:94px; width:16px; height:56px; border-radius:0 10px 10px 0; border:none; background:#1d4ed8; color:#fff; cursor:pointer; box-shadow:0 6px 12px rgba(29,78,216,.3); }
    .main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { background:var(--panel); padding:18px 28px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .topbar h1 { margin:0; font-size:24px; }
    .account-menu { position:relative; }
    .account-button { background:#fff; color:#111827; border:1px solid #d1d5db; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:600; }
    .dropdown { display:none; position:absolute; right:0; top:calc(100% + 8px); background:#fff; min-width:240px; border-radius:12px; box-shadow:0 12px 24px rgba(0,0,0,.12); overflow:hidden; z-index:1000; }
    .account-menu.open .dropdown { display:block; }
    .dropdown a { display:block; padding:14px 16px; text-decoration:none; color:var(--text); border-bottom:1px solid #f1f5f9; }
    .dropdown a:hover { background:#f8fafc; }
    .content { padding:28px; }
    .card { background:#fff; border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
    .card-head { padding:16px 18px; border-bottom:1px solid var(--line); }
    .card-body { padding:18px; display:grid; gap:12px; }
    .row { display:grid; grid-template-columns:180px 1fr; align-items:center; gap:16px; }
    .row label { font-size:13px; font-weight:700; color:#4b5563; }
    input, select, textarea { width:100%; border:1px solid #d1d5db; border-radius:10px; padding:10px 11px; font-size:14px; }
    textarea { min-height:120px; }
    .actions { display:flex; gap:10px; margin-top:4px; }
    .btn { border:none; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .btn.primary { background:#2563eb; color:#fff; }
    .btn.secondary { background:#eef2ff; color:#1e3a8a; }
    .saved { display:none; background:#dcfce7; color:#166534; border:1px solid #86efac; border-radius:10px; padding:8px 10px; font-size:13px; width:fit-content; }
    @media (max-width:900px){ .layout{flex-direction:column;} .sidebar-shell,.sidebar-shell:hover,.sidebar-shell.pinned{width:100%;} .sidebar-tab{display:none;} .company-name,.nav-label{opacity:1;transform:none;} .content{padding:20px;} .row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar-shell" id="sidebarShell">
      <div class="sidebar">
        <div class="sidebar-head"><div class="company-mark">CN</div><h2 class="company-name">Company Name</h2></div>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="nav-link"><span class="nav-label">Dashboard</span></a>
          <a href="submit-claims.html" class="nav-link active"><span class="nav-label">Submit Claims for Review</span></a>
          <a href="claims.html" class="nav-link"><span class="nav-label">Submitted Claims</span></a>
          <a href="reports.html" class="nav-link"><span class="nav-label">Reports</span></a>
          <a href="history.html" class="nav-link"><span class="nav-label">History</span></a>
        </nav>
      </div>
      <button class="sidebar-tab" id="sidebarTab" aria-label="Pin sidebar"><span>></span></button>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Submit Claim for Review</h1>
        <div class="account-menu">
          <button class="account-button" id="accountButton" aria-expanded="false" aria-haspopup="menu">Account</button>
          <div class="dropdown">
            <a href="account.html">Basic Account Information</a>
            <a href="billing.html">Billing & Invoices</a>
            <a href="agreements.html">Agreements</a>
            <a href="Index.html">Log Out</a>
          </div>
        </div>
      </div>

      <div class="content">
        <form class="card" id="submitClaimForm">
          <div class="card-head"><h2>New Claim Submission</h2></div>
          <div class="card-body">
            <div class="row"><label for="claimId">Claim ID</label><input id="claimId" name="claimId" placeholder="CLM-10080" required /></div>
            <div class="row"><label for="patient">Patient Name</label><input id="patient" name="patient" required /></div>
            <div class="row"><label for="account">Account #</label><input id="account" name="account" required /></div>
            <div class="row"><label for="payer">Payer</label><input id="payer" name="payer" required /></div>
            <div class="row"><label for="dos">Date of Service</label><input id="dos" name="dos" type="date" required /></div>
            <div class="row"><label for="amount">Claim Amount</label><input id="amount" name="amount" type="number" step="0.01" required /></div>
            <div class="row"><label for="reason">Reason for Review</label><select id="reason" name="reason"><option>Denied</option><option>Underpaid</option><option>No Response</option><option>Other</option></select></div>
            <div class="row"><label for="notes">Notes</label><textarea id="notes" name="notes" placeholder="Add context for your billing team."></textarea></div>
            <div class="actions">
              <button class="btn primary" type="submit">Submit Claim</button>
              <button class="btn secondary" type="reset">Clear</button>
              <span class="saved" id="savedNotice">Claim saved to queue.</span>
            </div>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const shell = document.getElementById('sidebarShell');
    const tab = document.getElementById('sidebarTab');
    const accountMenu = document.querySelector('.account-menu');
    const accountButton = document.getElementById('accountButton');
    const submitClaimForm = document.getElementById('submitClaimForm');
    const savedNotice = document.getElementById('savedNotice');

    tab.addEventListener('click', () => shell.classList.toggle('pinned'));
    accountButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const isOpen = accountMenu.classList.toggle('open');
      accountButton.setAttribute('aria-expanded', String(isOpen));
    });
    document.addEventListener('click', (event) => {
      if (!accountMenu.contains(event.target)) {
        accountMenu.classList.remove('open');
        accountButton.setAttribute('aria-expanded', 'false');
      }
    });

    submitClaimForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(submitClaimForm).entries());
      const queue = JSON.parse(localStorage.getItem('submitted_claims_queue') || '[]');
      queue.push({ ...payload, submittedAt: new Date().toISOString() });
      localStorage.setItem('submitted_claims_queue', JSON.stringify(queue));
      savedNotice.style.display = 'inline-block';
      setTimeout(() => { savedNotice.style.display = 'none'; }, 2200);
      submitClaimForm.reset();
    });
  </script>
</body>
</html>
